# Default run configuration (spec §9). Defaults are the decided D2/D3 values
# (K=3, K_baseline=6, margin=2.0, alpha=0.05); changing them requires a dated
# decision-log amendment (docs/decisions.md).

models:
  candidate_a: claude-haiku-4-5-20251001
  candidate_b: gpt-5.4-mini
  judge: gemini-3-flash-preview

prompt_version: 4

dataset:
  path: data/golden/golden.jsonl
  version: 1

k: 3
k_baseline: 6
# Widened 2026-07-17: gemini-3-flash-preview's 503 load-shedding bursts
# (observed live 2026-07-16/17) run 2-5 minutes -- longer than the previous
# 4-attempt, ~30s total patience, which could abort an almost-complete run
# mid-burst. Paired with retry.py's 120s per-wait cap, worst-case total wait
# before TransportExhausted is ~8 minutes, well inside CI's 30-minute budget.
retry_max_attempts: 12

gate:
  margin: 2.0
  alpha: 0.05

# List prices per provider, USD per million tokens (MTok). Approximate at the
# snapshot date below -- not a live price feed. Consumed by the gate summary
# for token-cost reporting (spec §7, §9).
price_snapshot:
  date: "2026-07-16"
  label: approximate-at-snapshot
  candidate_a:
    input_per_mtok: 1.00
    output_per_mtok: 5.00
  candidate_b:
    input_per_mtok: 0.75
    output_per_mtok: 4.50
  judge:
    input_per_mtok: 0.50
    output_per_mtok: 3.00

langfuse:
  host: https://cloud.langfuse.com
